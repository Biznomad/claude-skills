<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Starter — replace</title>
<meta name="description" content="Replace with page description.">
<style>
  :root{--bg:#000;--text:#fff;--muted:#9a9a9a;--accent:#e8415a;
        --grad:linear-gradient(90deg,#ffb000,#e8415a);}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;line-height:1.6;overflow-x:hidden}
  /* Canvas sits behind DOM content — content never depends on WebGL */
  #scene{position:fixed;inset:0;z-index:0;pointer-events:none}
  main{position:relative;z-index:1}
  .hero{min-height:100svh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:24px}
  .hero h1{font-size:clamp(36px,6vw,72px);font-weight:800;letter-spacing:-1.5px;line-height:1.05}
  .hero h1 .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .cta{display:inline-block;margin-top:28px;background:var(--grad);color:#111;font-weight:700;
       padding:14px 32px;border-radius:12px;text-decoration:none}
  .cta:focus-visible{outline:3px solid var(--accent);outline-offset:3px}
  section{min-height:80vh;max-width:1100px;margin:0 auto;padding:96px 24px}
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease}
  .reveal.in{opacity:1;transform:none}
  @media (prefers-reduced-motion: reduce){
    .reveal{opacity:1;transform:none;transition:none}
  }
</style>
</head>
<body>
<canvas id="scene" aria-hidden="true"></canvas>
<main>
  <header class="hero">
    <h1>Real headline in <span class="grad">DOM</span>,<br>never in canvas</h1>
    <p style="color:var(--muted);margin-top:12px">LCP is this text — the scene is decoration.</p>
    <a class="cta" href="#next">Primary action</a>
  </header>
  <section id="next" class="reveal"><h2>Section</h2><p>Content revealed on intersection.</p></section>
</main>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}
</script>
<script type="module">
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

// Section reveals — IntersectionObserver, not scroll math
const io = new IntersectionObserver(es => es.forEach(e => {
  if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
}), {threshold: 0.15});
document.querySelectorAll('.reveal').forEach(el => io.observe(el));

// 3D is additive: reduced-motion users and failed imports get the styled DOM page
if (!reduced) init3D().catch(() => document.documentElement.classList.add('no-webgl'));

async function init3D() {
  const THREE = await import('three');
  const canvas = document.getElementById('scene');
  const renderer = new THREE.WebGLRenderer({canvas, alpha: true, antialias: true});
  const isMobile = innerWidth < 768;
  renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.5 : 2)); // DPR cap
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
  camera.position.z = 6;

  // Scale work to the device
  const COUNT = isMobile ? 800 : 2400;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(COUNT * 3);
  for (let i = 0; i < pos.length; i++) pos[i] = (Math.random() - 0.5) * 14;
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({size: 0.03, color: 0xe8415a, transparent: true, opacity: 0.8});
  const points = new THREE.Points(geo, mat);
  scene.add(points);

  // Lerped scroll progress drives the camera — smooth, framework-agnostic
  let target = 0, progress = 0;
  addEventListener('scroll', () => {
    target = scrollY / (document.body.scrollHeight - innerHeight || 1);
  }, {passive: true});

  // Pause when hidden or offscreen
  let running = true, visible = true;
  document.addEventListener('visibilitychange', () => { running = !document.hidden; });
  new IntersectionObserver(([e]) => { visible = e.isIntersecting; }).observe(canvas);

  addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  renderer.setSize(innerWidth, innerHeight);

  renderer.setAnimationLoop((t) => {
    if (!running || !visible) return;
    progress += (target - progress) * 0.06;        // lerp
    points.rotation.y = t * 0.00004 + progress * 1.2;
    camera.position.y = -progress * 2;
    renderer.render(scene, camera);
  });
}
</script>
</body>
</html>
